name: zon
description: Proof-of-Presence social platform
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # Maps
  mapbox_maps_flutter: ^2.2.0

  # Camera & AR
  camera: ^0.11.0

  # AI / ML
  tflite_flutter: ^0.10.4
  onnxruntime: ^1.4.1

  # Location & Sensors
  geolocator: ^12.0.0
  geofence_service: ^6.0.0+1
  sensors_plus: ^4.0.2

  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local storage
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Media
  image_picker: ^1.1.0
  flutter_image_compress: ^2.2.0
  cached_network_image: ^3.3.1
  video_player: ^2.8.3
  record: ^5.1.0

  # Auth & Security
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Utils
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  crypto: ^3.0.3
  fpdart: ^1.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - .env
